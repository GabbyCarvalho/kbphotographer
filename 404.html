<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      
      var path = window.location.pathname;

     
      window.location.replace(
        window.location.origin + "/?redirect=" + path
      );
    </script>
  </head>
  <body></body>
</html>
